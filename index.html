<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dispatch 車載画面</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#111827;
      --sub:#6b7280;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --red:#dc2626;
      --yellow:#facc15;
      --purple:#7c3aed;
      --green:#16a34a;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:#111827;
      color:#fff;
      padding:16px;
    }

    header h1{
      margin:0;
      font-size:20px;
    }

    header .sub{
      margin-top:6px;
      font-size:13px;
      color:#d1d5db;
    }

    .wrap{
      max-width:1450px;
      margin:0 auto;
      padding:16px;
    }

    .layout{
      display:grid;
      grid-template-columns:400px 1fr;
      gap:16px;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .panel{
      padding:14px;
      margin-bottom:16px;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:16px;
    }

    input, button, select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #d1d5db;
      font-size:14px;
      background:#fff;
    }

    button{
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{
      background:#111827;
      color:#fff;
      border-color:#111827;
    }

    .btn-red{
      background:#fff;
      color:#b91c1c;
      border-color:#fecaca;
    }

    .btn-green{
      background:#fff;
      color:#15803d;
      border-color:#bbf7d0;
    }

    .btn-blue{
      background:#eff6ff;
      color:#1d4ed8;
      border-color:#bfdbfe;
    }

    .btn-white{
      background:#fff;
      color:#111827;
      border-color:#d1d5db;
    }

    .top-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .small{
      font-size:12px;
      color:var(--sub);
    }

    .status{
      margin-top:10px;
      font-size:13px;
      color:#374151;
      word-break:break-word;
      line-height:1.6;
    }

    .warning{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #fecaca;
      background:#fef2f2;
      color:#991b1b;
      font-size:13px;
      line-height:1.6;
      font-weight:700;
    }

    .legend{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#f3f4f6;
      color:#374151;
    }

    .badge-blue{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .badge-red{
      background:#fee2e2;
      color:#b91c1c;
    }

    .badge-yellow{
      background:#fef9c3;
      color:#92400e;
    }

    .badge-purple{
      background:#ede9fe;
      color:#6d28d9;
    }

    .badge-white{
      background:#fff;
      color:#111827;
      border:1px solid #d1d5db;
    }

    .row-between{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .actions button{
      width:auto;
      min-width:120px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:#fff;
    }

    .item-title{
      font-weight:700;
      margin-bottom:4px;
    }

    .item-sub{
      font-size:12px;
      color:var(--sub);
      line-height:1.5;
      word-break:break-word;
    }

    #map{
      width:100%;
      height:80vh;
      min-height:560px;
      border-radius:14px;
      overflow:hidden;
    }

    .map-card{
      padding:10px;
    }

    .space10{ height:10px; }

    .status-box{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
    }

    .status-label{
      font-size:12px;
      color:#64748b;
      margin-bottom:4px;
    }

    .status-value{
      font-weight:700;
      font-size:14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>dispatch 車載画面</h1>
    <div class="sub">GPS送信 / 地点表示 / ナビ開始 / 状態送信</div>
  </header>

  <div class="wrap">
    <div class="layout">
      <div>
        <div class="card panel">
          <h2>開始設定</h2>

          <div class="small">会社QRで会社は自動設定されます</div>
          <div id="companyNameView" class="status">会社未設定</div>

          <div class="space10"></div>

          <div class="top-grid">
            <input id="vehicleIdInput" placeholder="車番 例: 1号車 / truck01" />
            <input id="driverNameInput" placeholder="名前 例: 岸澤" />
          </div>

          <div class="actions">
            <button id="saveLoginBtn" class="btn-primary">保存して開始</button>
            <button id="logoutBtn" class="btn-red">ログアウト</button>
          </div>

          <div class="warning">
            運転中の画面操作は禁止です。操作は必ず安全な場所に停車してから行ってください。
          </div>
        </div>

        <div class="card panel">
          <h2>現在の状態</h2>

          <div class="status-box">
            <div class="status-label">会社</div>
            <div id="currentCompanyName" class="status-value">未設定</div>
          </div>

          <div class="status-box">
            <div class="status-label">車番</div>
            <div id="currentVehicleId" class="status-value">未設定</div>
          </div>

          <div class="status-box">
            <div class="status-label">GPS送信状態</div>
            <div id="gpsStatus" class="status-value">GPS未開始</div>
          </div>

          <div class="status-box">
            <div class="status-label">車両ステータス</div>
            <div id="vehicleStatusText" class="status-value">通常</div>
          </div>

          <div class="legend">
            <span class="badge badge-red">現場</span>
            <span class="badge badge-yellow">待機場所</span>
            <span class="badge badge-purple">工場</span>
          </div>
        </div>

        <div class="card panel">
          <h2>作業状態</h2>
          <div class="small">管理画面ではこの状態で車両ピン色が変わります</div>

          <div class="actions">
            <button id="unloadingDoneBtn" class="btn-blue">荷下ろし完了</button>
            <button id="washDoneBtn" class="btn-white">残水・残コン処理完了</button>
          </div>

          <div id="statusActionResult" class="status">まだ操作していません。</div>
        </div>

        <div class="card panel">
          <div class="row-between">
            <h2>地点一覧</h2>
            <span id="pointCount" class="badge">0件</span>
          </div>
          <div class="small">地点をタップするとナビを開始できます</div>
          <div id="pointList" class="list"></div>
        </div>
      </div>

      <div class="card map-card">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      off,
      update,
      remove,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUKBDIyzCxy-LawDU4zhmzyJBXgfS5pNI",
      authDomain: "dispatch-d25b8.firebaseapp.com",
      databaseURL: "https://dispatch-d25b8-default-rtdb.firebaseio.com",
      projectId: "dispatch-d25b8",
      storageBucket: "dispatch-d25b8.firebasestorage.app",
      messagingSenderId: "762412395171",
      appId: "1:762412395171:web:65e2ff185d396d94eb6d16"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const STORAGE_KEY = "dispatch_vehicle_session_v2";

    const vehicleIdInput = document.getElementById("vehicleIdInput");
    const driverNameInput = document.getElementById("driverNameInput");
    const saveLoginBtn = document.getElementById("saveLoginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const companyNameView = document.getElementById("companyNameView");
    const currentCompanyName = document.getElementById("currentCompanyName");
    const currentVehicleId = document.getElementById("currentVehicleId");
    const gpsStatus = document.getElementById("gpsStatus");
    const vehicleStatusText = document.getElementById("vehicleStatusText");

    const unloadingDoneBtn = document.getElementById("unloadingDoneBtn");
    const washDoneBtn = document.getElementById("washDoneBtn");
    const statusActionResult = document.getElementById("statusActionResult");

    const pointCount = document.getElementById("pointCount");
    const pointList = document.getElementById("pointList");

    let map;
    let myMarker = null;
    let pointMarkers = {};
    let pointsRef = null;
    let settingsRef = null;
    let pointsCache = {};
    let settingsCache = {};
    let watchId = null;

    let session = {
      companyCode: "",
      vehicleId: "",
      driverName: "",
      status: "normal",
      statusLabel: "通常"
    };

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeNumber(value){
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function getUrlCompanyCode(){
      const params = new URLSearchParams(location.search);
      return (params.get("companyCode") || "").trim();
    }

    function makeCircleIcon(fillColor, borderColor = "#ffffff"){
      return L.divIcon({
        html: `
          <div style="
            width:20px;
            height:20px;
            border-radius:50%;
            background:${fillColor};
            border:4px solid ${borderColor};
            box-shadow:0 0 0 2px rgba(17,24,39,.35);
          "></div>
        `,
        className: "",
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    function pointTypeStyle(type){
      if (type === "waiting"){
        return { color: "#facc15", label: "待機場所" };
      }
      if (type === "factory"){
        return { color: "#7c3aed", label: "工場" };
      }
      return { color: "#dc2626", label: "現場" };
    }

    function initMap(){
      map = L.map("map").setView([36.0, 139.4], 11);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);
    }

    function saveSession(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
    }

    function loadSession(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      }catch{
        return null;
      }
    }

    function clearSession(){
      localStorage.removeItem(STORAGE_KEY);
    }

    function applySessionToInputs(){
      vehicleIdInput.value = session.vehicleId || "";
      driverNameInput.value = session.driverName || "";
    }

    function renderCompanyInfo(){
      const companyName = settingsCache.companyName || "会社未設定";
      companyNameView.textContent = companyName;
      currentCompanyName.textContent = companyName;
      currentVehicleId.textContent = session.vehicleId || "未設定";
      vehicleStatusText.textContent = session.statusLabel || "通常";
    }

    function clearPointMarkers(){
      Object.values(pointMarkers).forEach(marker => map.removeLayer(marker));
      pointMarkers = {};
    }

    function flattenPoints(pointsRoot){
      const result = [];
      const siteObj = pointsRoot?.site || {};
      const waitingObj = pointsRoot?.waiting || {};
      const factoryObj = pointsRoot?.factory || {};

      Object.entries(siteObj).forEach(([pointId, data]) => {
        result.push({ pointId, type: "site", ...data });
      });

      Object.entries(waitingObj).forEach(([pointId, data]) => {
        result.push({ pointId, type: "waiting", ...data });
      });

      Object.entries(factoryObj).forEach(([pointId, data]) => {
        result.push({ pointId, type: "factory", ...data });
      });

      return result;
    }

    function openNavigation(lat, lng, label){
      const ok = confirm(`${label} へ案内開始しますか？`);
      if (!ok) return;

      const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
      window.open(url, "_blank");
    }

    function renderPoints(){
      clearPointMarkers();

      const list = flattenPoints(pointsCache);
      pointCount.textContent = `${list.length}件`;
      pointList.innerHTML = "";

      if (list.length === 0){
        pointList.innerHTML = `<div class="item"><div class="item-sub">地点データがありません</div></div>`;
        return;
      }

      list.forEach((point) => {
        const lat = normalizeNumber(point?.lat ?? point?.latitude);
        const lng = normalizeNumber(point?.lng ?? point?.longitude);
        const name = point?.name || point.pointId;
        const memo = point?.memo || "";
        const type = point?.type || "site";
        const style = pointTypeStyle(type);

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="item-title">${escapeHtml(name)}</div>
          <div class="item-sub">種別: ${escapeHtml(style.label)}</div>
          <div class="item-sub">メモ: ${escapeHtml(memo || "-")}</div>
          <div class="item-sub">lat: ${lat ?? "-"}</div>
          <div class="item-sub">lng: ${lng ?? "-"}</div>
          <div class="actions">
            <button class="point-nav-btn btn-green">ナビ開始</button>
          </div>
        `;
        pointList.appendChild(div);

        const button = div.querySelector(".point-nav-btn");
        if (button && lat !== null && lng !== null){
          button.addEventListener("click", () => openNavigation(lat, lng, name));
        }

        if (lat !== null && lng !== null){
          const markerKey = `${type}_${point.pointId}`;
          const marker = L.marker([lat, lng], {
            icon: makeCircleIcon(style.color, "#ffffff")
          }).addTo(map);

          marker.on("click", () => openNavigation(lat, lng, name));

          marker.bindPopup(`
            <div style="min-width:180px;">
              <b>${escapeHtml(name)}</b><br>
              種別: ${escapeHtml(style.label)}<br>
              メモ: ${escapeHtml(memo || "-")}<br>
              lat: ${lat}<br>
              lng: ${lng}
            </div>
          `);

          pointMarkers[markerKey] = marker;
        }
      });
    }

    function stopPointsListener(){
      if (pointsRef) off(pointsRef);
      if (settingsRef) off(settingsRef);
      pointsRef = null;
      settingsRef = null;
      pointsCache = {};
      settingsCache = {};
      clearPointMarkers();
      pointList.innerHTML = "";
      pointCount.textContent = "0件";
    }

    function startCompanyListeners(){
      stopPointsListener();

      if (!session.companyCode) return;

      pointsRef = ref(db, `companies/${session.companyCode}/points`);
      settingsRef = ref(db, `companies/${session.companyCode}/settings`);

      onValue(pointsRef, (snapshot) => {
        pointsCache = snapshot.val() || {};
        renderPoints();
      });

      onValue(settingsRef, (snapshot) => {
        settingsCache = snapshot.val() || {};
        renderCompanyInfo();
      });
    }

    async function writeVehiclePosition(lat, lng, accuracy = null){
      if (!session.companyCode || !session.vehicleId) return;

      const vehicleRef = ref(db, `companies/${session.companyCode}/vehicles/${session.vehicleId}`);

      const payload = {
        vehicleId: session.vehicleId,
        name: session.driverName || "",
        companyCode: session.companyCode,
        lat,
        lng,
        accuracy: accuracy ?? null,
        updatedAt: new Date().toISOString(),
        updatedAtServer: serverTimestamp(),
        online: true,
        status: session.status || "normal",
        statusLabel: session.statusLabel || "通常"
      };

      await update(vehicleRef, payload);
    }

    function updateMyMarker(lat, lng){
      if (!myMarker){
        myMarker = L.marker([lat, lng], {
          icon: makeCircleIcon("#2563eb", "#ffffff")
        }).addTo(map);
      } else {
        myMarker.setLatLng([lat, lng]);
      }

      myMarker.bindPopup(`
        <div style="min-width:180px;">
          <b>${escapeHtml(session.vehicleId || "自車両")}</b><br>
          会社: ${escapeHtml(settingsCache.companyName || "-")}<br>
          状態: ${escapeHtml(session.statusLabel || "通常")}<br>
          lat: ${lat}<br>
          lng: ${lng}
        </div>
      `);
    }

    function stopGpsWatch(){
      if (watchId !== null){
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    function startGpsWatch(){
      stopGpsWatch();

      if (!navigator.geolocation){
        gpsStatus.textContent = "この端末ではGPSが使えません";
        return;
      }

      if (!session.companyCode || !session.vehicleId){
        gpsStatus.textContent = "会社QRと車番設定が必要です";
        return;
      }

      gpsStatus.textContent = "GPS開始中...";

      watchId = navigator.geolocation.watchPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          const accuracy = pos.coords.accuracy;

          updateMyMarker(lat, lng);

          try{
            await writeVehiclePosition(lat, lng, accuracy);
            gpsStatus.textContent = `GPS送信中 / 最終更新 ${new Date().toLocaleTimeString("ja-JP")}`;
          }catch(error){
            console.error(error);
            gpsStatus.textContent = "通信エラー中 / セッション保持中 / 復帰後再送信";
          }
        },
        (error) => {
          console.error(error);
          gpsStatus.textContent = `GPS取得エラー / ログアウトはしていません`;
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 3000
        }
      );
    }

    async function updateVehicleStatus(status, statusLabel){
      if (!session.companyCode || !session.vehicleId){
        alert("先に開始してください");
        return;
      }

      const ok = confirm(`${statusLabel} にしますか？`);
      if (!ok) return;

      session.status = status;
      session.statusLabel = statusLabel;
      saveSession();
      renderCompanyInfo();

      try{
        const vehicleRef = ref(db, `companies/${session.companyCode}/vehicles/${session.vehicleId}`);
        await update(vehicleRef, {
          status,
          statusLabel,
          statusUpdatedAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });

        statusActionResult.textContent = `${statusLabel} に更新しました。`;
      }catch(error){
        console.error(error);
        statusActionResult.textContent = `状態更新に失敗しました。通信状態を確認してください。`;
      }
    }

    async function removeVehicleOnLogout(){
      if (!session.companyCode || !session.vehicleId) return;
      const vehicleRef = ref(db, `companies/${session.companyCode}/vehicles/${session.vehicleId}`);
      await remove(vehicleRef);
    }

    async function loginAndStart(){
      const urlCompanyCode = getUrlCompanyCode() || session.companyCode || "";
      const nextVehicleId = (vehicleIdInput.value || "").trim();
      const nextDriverName = (driverNameInput.value || "").trim();

      if (!urlCompanyCode){
        alert("会社QRを読み取って companyCode を設定してください");
        return;
      }

      if (!nextVehicleId){
        alert("車番を入力してください");
        return;
      }

      session.companyCode = urlCompanyCode;
      session.vehicleId = nextVehicleId;
      session.driverName = nextDriverName;
      session.status = session.status || "normal";
      session.statusLabel = session.statusLabel || "通常";

      saveSession();
      applySessionToInputs();
      renderCompanyInfo();
      startCompanyListeners();
      startGpsWatch();

      gpsStatus.textContent = "セッション保存済み / GPS開始中";
    }

    async function logout(){
      if (!session.companyCode || !session.vehicleId){
        clearSession();
        gpsStatus.textContent = "ログアウトしました";
        return;
      }

      stopGpsWatch();

      try{
        await removeVehicleOnLogout();
      }catch(error){
        console.error(error);
        gpsStatus.textContent = "ログアウト処理失敗 / 通信確認後に再実行してください";
        startGpsWatch();
        return;
      }

      stopPointsListener();

      session = {
        companyCode: "",
        vehicleId: "",
        driverName: "",
        status: "normal",
        statusLabel: "通常"
      };

      clearSession();
      applySessionToInputs();

      if (myMarker){
        map.removeLayer(myMarker);
        myMarker = null;
      }

      renderCompanyInfo();
      gpsStatus.textContent = "ログアウトしました";
      statusActionResult.textContent = "まだ操作していません。";
    }

    function setupFromUrlOrStorage(){
      const saved = loadSession();
      const urlCompanyCode = getUrlCompanyCode();

      if (saved){
        session = {
          companyCode: saved.companyCode || "",
          vehicleId: saved.vehicleId || "",
          driverName: saved.driverName || "",
          status: saved.status || "normal",
          statusLabel: saved.statusLabel || "通常"
        };
      }

      if (urlCompanyCode){
        session.companyCode = urlCompanyCode;
        saveSession();
      }

      applySessionToInputs();
      renderCompanyInfo();

      if (session.companyCode){
        startCompanyListeners();
      }

      if (session.companyCode && session.vehicleId){
        startGpsWatch();
      }
    }

    saveLoginBtn.addEventListener("click", async () => {
      await loginAndStart();
    });

    logoutBtn.addEventListener("click", async () => {
      if (!session.companyCode || !session.vehicleId){
        alert("現在開始していません");
        return;
      }

      const first = confirm(
        `ログアウト確認\n\n会社: ${settingsCache.companyName || session.companyCode}\n車番: ${session.vehicleId}\n\nOKで確認を進めます。`
      );
      if (!first) return;

      const second = confirm(
        `この操作で現在の車両表示は削除されます。\n本当にログアウトしますか？`
      );
      if (!second) return;

      await logout();
    });

    unloadingDoneBtn.addEventListener("click", async () => {
      await updateVehicleStatus("unloading_completed", "荷下ろし完了");
    });

    washDoneBtn.addEventListener("click", async () => {
      await updateVehicleStatus("ready_for_next_load", "残水・残コン処理完了");
    });

    window.addEventListener("beforeunload", () => {
      stopGpsWatch();
    });

    initMap();
    setupFromUrlOrStorage();
  </script>
</body>
</html>
